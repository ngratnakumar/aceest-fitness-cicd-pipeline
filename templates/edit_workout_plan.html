{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-7">
        <div class="card shadow-sm border-0 mt-4">
            <div class="card-body p-4">
                <h3 class="mb-3">Edit Workout Plan</h3>

                <form method="POST" action="{{ url_for('edit_workout_plan', plan_id=plan.id) }}" class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Plan Title</label>
                        <input type="text" name="title" class="form-control" value="{{ plan.title }}" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Assign To User</label>
                        <select name="user_id" class="form-select" required>
                            {% for user in assigned_users %}
                                <option value="{{ user.id }}" {% if user.id == plan.user_id %}selected{% endif %}>
                                    {{ user.username }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Plan Details</label>
                        <textarea name="details" class="form-control" rows="4" required>{{ plan.details }}</textarea>
                    </div>

                    <div class="col-12 d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Update Plan</button>
                        <a href="{{ url_for('trainer_dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
